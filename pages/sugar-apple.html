<!doctype html>

<!-- IMPORTANT: this connects to your JS -->
<body class="d-flex flex-column min-vh-100" data-page="sugarapple">


  <!-- Navbar -->

    <div class="container-fluid flex-column align-items-stretch px-0">

      <!-- Brand -->
      <div class="w-100 px-3 py-2 d-flex align-items-center">
        <a class="navbar-brand fw-bold mb-0" href="../index.html">Kyarakutā</a>

        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"

          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            <li class="nav-item"></li>
          </ul>
        </div>

      <div class="border-top py-3 search-container">
        <div class="container">

          <form class="d-flex align-items-center gap-2 justify-content-center">

            <!-- FIX: removed disabled -->
            <input id="searchBox" class="searchClass form-control form-control-lg flex-grow-1 rounded-pill"
              type="search" placeholder="search for a character!" aria-label="Search">

        </div>
      </div>

  <div class="text-center my-3">
