<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyarakutā</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../styles/style.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark sticky-top p-0">
    <div class="container-fluid flex-column align-items-stretch px-0">

      <div class="w-100 px-3 py-2 d-flex align-items-center">
        <a class="navbar-brand fw-bold mb-0">Kyarakutā</a>

        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0"></ul>

          <span id="userGreeting" class="text-light"></span>
          <a href="pages/login.html" id="btnLogin" class="btn btn-light ms-sm-3 d-none">login</a>
          <button id="btnLogout" class="btn btn-outline-light ms-sm-3 d-none">logout</button>
        </div>
      </div>

      <div class="border-top py-3 search-container">
        <div class="container">
          <form class="d-flex align-items-center gap-2 justify-content-center">
            <input id="searchBox"
              class="searchClass form-control form-control-lg flex-grow-1 rounded-pill"
              disabled type="search" placeholder="search...">
          </form>
        </div>
      </div>

    </div>
  </nav>

  <!-- ✅ FIX: MAIN WRAPPER ADDED -->
  <main class="flex-grow-1">

    <div class="text-center">
      <h1 class="m-2 p-2">Series Selection</h1>
    </div>

    <!-- video content -->
    <div class="container my-4">
      <div class="card protected border-0 bg-transparent">
        <div id="videoGrid" class="row g-3"></div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark border-0 position-relative">

          <button type="button" class="custom-close" data-bs-dismiss="modal">&times;</button>

          <div class="modal-body text-center p-0">
            <img id="modalImage" src="" class="img-fluid w-100">
          </div>

        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="py-3 bg-light border-top">
    <div class="container">
      <div class="d-flex justify-content-center align-items-center gap-4 small text-muted flex-wrap">
        <span>&copy; 2026 Kyarakutā</span>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/cards.js"></script>
  <script src="../scripts/login-logout.js"></script>
  <script src="../scripts/series-search.js"></script>

</body>

</html>
